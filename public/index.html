<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counsel — Call Recorder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Counsel</h1>
      <p class="subtitle">Zoom Call Recorder</p>
    </header>

    <section class="recorder-section">
      <div class="company-input-row">
        <input type="text" id="companyName" placeholder="Company name" autocomplete="off" spellcheck="false">
      </div>

      <div class="waves-container" id="wavesContainer">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
        <button class="record-btn" id="recordBtn" aria-label="Start recording">
          <div class="record-icon" id="recordIcon"></div>
        </button>
      </div>

      <p class="status" id="status">Click to start recording</p>
      <div class="timer" id="timer">00:00</div>
    </section>

    <section class="visualizer-section">
      <canvas id="waveformCanvas"></canvas>
      <div class="channel-labels" id="channelLabels">
        <span class="label-mic">Microphone</span>
        <span class="label-sys">Meeting Audio</span>
      </div>
    </section>

    <div class="info-box" id="infoBox">
      <div class="info-icon">i</div>
      <p>When prompted, choose <strong>Share Screen with Audio</strong> to capture other participants. On macOS, enable <strong>System Audio</strong> in the share dialog.</p>
    </div>

    <section class="download-section" id="downloadSection">
      <div class="recording-meta" id="recordingMeta"></div>
      <button class="download-btn" id="downloadBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Recording
      </button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
